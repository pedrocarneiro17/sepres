<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar · Sistema DP</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="flex min-h-screen items-center justify-center bg-slate-50 px-4 font-sans text-slate-800 antialiased">
    <div class="w-full max-w-sm">
        <div class="mb-6 flex flex-col items-center gap-3 text-center">
            <img src="/static/img/logo-sepres.jpeg" alt="SEPRES" class="h-16 w-auto object-contain">
            <p class="text-sm text-slate-500">Acesse com suas credenciais</p>
        </div>

        <div class="card p-6">
            {% if erro %}
            <div class="mb-4 flex items-center gap-2 rounded-xl border border-rose-200 bg-rose-50 px-3.5 py-2.5 text-sm text-rose-700">
                <i class="fas fa-circle-exclamation"></i> {{ erro }}
            </div>
            {% endif %}

            <form method="post" class="space-y-4">
                <div>
                    <label class="label" for="username">Usuário</label>
                    <div class="relative">
                        <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400"><i class="fas fa-user text-xs"></i></span>
                        <input class="input pl-9" type="text" id="username" name="username" autocomplete="username" required autofocus>
                    </div>
                </div>
                <div>
                    <label class="label" for="password">Senha</label>
                    <div class="relative">
                        <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400"><i class="fas fa-lock text-xs"></i></span>
                        <input class="input pl-9" type="password" id="password" name="password" autocomplete="current-password" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary w-full"><i class="fas fa-right-to-bracket"></i> Entrar</button>
            </form>
        </div>

        <p class="mt-6 text-center text-xs text-slate-400">Sistema DP · Departamento Pessoal</p>
    </div>
</body>
</html>
